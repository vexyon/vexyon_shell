#  ‚ēö‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ   ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēó   ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ  ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ
#   ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēĎ   ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ
#    ‚ēö‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ    ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ
#  VEXYON ‚ÄĒ a custom Wayland shell (this marker line tells install.sh the file
#  is ours; without it every re-run would back it up again). Keybinds & numeric
#  settings are GENERATED from ~/.config/vexyon/shell.json by the bridge
#  daemon ‚ÄĒ do not edit those here.
# ============================================================================

# ---- Monitors (auto; override in ~/.config/hypr/vexyon-monitors.conf) -------
monitor = , preferred, auto, 1
source = ~/.config/hypr/vexyon-monitors.conf

# ---- Environment (Wayland/Qt) ----------------------------------------------
source = ~/.config/hypr/vexyon-env.conf

# ---- Generated GPU pin (install.sh detects the topology and pins the shell
#      to the integrated GPU; vexyon-gpu-hotplug rewrites it live when a
#      display crosses the iGPU/dGPU boundary; informational on single-GPU) --
source = ~/.config/hypr/vexyon-gpu.conf

# ---- Generated numeric settings (gaps, border, rounding, blur) -------------
source = ~/.config/hypr/vexyon-settings.conf

# ---- Window & layer rules (blur discipline) --------------------------------
source = ~/.config/hypr/vexyon-rules.conf

# ---- Generated keybinds (from shell.json) ----------------------------------
source = ~/.config/hypr/vexyon-keybinds.conf

# ============================================================================
#  STATIC LOOK & FEEL  (colors/opacity handled by Quickshell; these are the
#  compositor-level bits Quickshell can't own)
# ============================================================================
general {
    layout = dwindle
    resize_on_border = true
    # col.active_border / col.inactive_border viven en el GENERADO
    # vexyon-settings.conf (paleta del tema activo). No ponerlos aqu√≠: este
    # bloque se parsea DESPU√ČS del source y pisar√≠a el valor del bridge
    # (√ļltima asignaci√≥n gana).
    allow_tearing = false
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000055)
    }
}

dwindle {
    preserve_split = true
    smart_split = false
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    focus_on_activate = true
    animate_manual_resizes = true
    key_press_enables_dpms = true
    # Si el proceso del shell (quickshell) muere o recarga su config MIENTRAS la
    # sesi√≥n est√° bloqueada, Hyprland deja la sesi√≥n en el fallback "lockscreen
    # app died" y el usuario queda ATRAPADO (no puede volver al shell). Con esto
    # el shell puede re-adquirir el ext-session-lock y soltarlo al desbloquear en
    # lugar de estrangular la sesi√≥n. Red de seguridad para el bloqueo (Bug 2).
    allow_session_lock_restore = true
}

input {
    # kb_layout y follow_mouse viven en el GENERADO vexyon-settings.conf
    # (Ajustes ‚Üí Comportamiento). No ponerlos aqu√≠: este bloque se parsea
    # DESPU√ČS del source y pisar√≠a el valor del bridge (√ļltima asignaci√≥n gana).
    sensitivity = 0
    touchpad {
        natural_scroll = true
        disable_while_typing = true
    }
}

# Touchpad workspace-swipe gesture (new 0.55 syntax) lives in the generated
# vexyon-keybinds.conf as: gesture = 3, horizontal, workspace

# ============================================================================
#  ANIMATIONS  (GPU-accelerated, tuned for fluidity without CPU spikes)
# ============================================================================
animations {
    enabled = true
    bezier = vexyonEase, 0.16, 1, 0.3, 1
    bezier = vexyonSnap, 0.34, 1.56, 0.64, 1
    bezier = vexyonSmooth, 0.4, 0, 0.2, 1

    animation = windows, 1, 4, vexyonEase, popin 6%
    animation = windowsOut, 1, 4, vexyonSmooth, popin 6%
    animation = windowsMove, 1, 4, vexyonEase
    animation = border, 1, 6, default
    animation = fade, 1, 4, vexyonSmooth
    animation = workspaces, 1, 5, vexyonEase, slide
    animation = specialWorkspace, 1, 5, vexyonEase, slidevert
    animation = layers, 1, 4, vexyonSmooth, fade
}

# ============================================================================
#  AUTOSTART
# ============================================================================
# Bridge daemon: keeps shell.json <-> Hyprland keybinds/settings in sync.
exec-once = python3 ~/.config/vexyon/bridge/vexyon-bridge.py

# The Vexyon shell itself (bar, launcher, control center, notifications...).
exec-once = qs -p ~/.config/vexyon/shell.qml

# Wallpaper daemon.
# swww fue renombrado a awww upstream; lanzar el daemon que exista
exec-once = bash -c 'exec "$(command -v swww-daemon || command -v awww-daemon)"'

# Brightness / color-temperature backend (modern Hyprland: no wlr-gamma-control).
exec-once = hyprsunset

# Polkit authentication agent (for privileged actions).
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# XDG desktop portal for screensharing/file dialogs.
exec-once = /usr/lib/xdg-desktop-portal-hyprland

# Clipboard history collector.
exec-once = wl-paste --watch cliphist store
