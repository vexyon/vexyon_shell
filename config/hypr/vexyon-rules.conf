# ============================================================================
#  VEXYON — WINDOW & LAYER RULES
#
#  Hyprland 0.55.4 layerrule GRAMMAR (re-verificada en vivo en Session 41 —
#  la forma de S4 `blur true vexyon-bar` parseaba pero el formato canónico,
#  el mismo que usa DMS, es con selector match: y separado por coma):
#      layerrule = <efecto> <valor>, match:namespace <regex>
#  Nombres de efecto NUEVOS con guion bajo: `ignore_alpha`, `no_anim`…
#  (`ignorealpha` legacy => "invalid field type ignorealpha").
#
#  El blur de la barra (appearance.barBlur en shell.json) lo emite el BRIDGE
#  en vexyon-settings.conf: decoration:blur:enabled = true/false + las dos
#  layerrules (blur on + ignore_alpha) sobre el namespace vexyon-bar.
#  Los popups usan otros namespaces sin regla => no se desenfocan (spec).
#  No dupliques esas reglas aquí.
# ============================================================================
