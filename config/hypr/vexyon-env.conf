# ============================================================================
#  VEXYON — ENVIRONMENT
#  Wayland/Qt/toolkit env only. GPU selection does NOT live here: it is
#  machine-specific and GENERATED into vexyon-gpu.conf (install.sh detects
#  the topology; vexyon-gpu-hotplug re-decides it on display hotplug).
# ============================================================================

# --- Wayland / Qt / toolkit ---
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11

# --- Cursor ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# --- Vexyon paths ---
env = WALLPAPER_DIR,~/Pictures/Wallpapers
