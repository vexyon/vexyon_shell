# ============================================================================
#  VEXYON — AUTOGENERATED. DO NOT EDIT BY HAND.
#  Edit ~/.config/vexyon/shell.json (or use the Keybind Editor); the bridge
#  daemon regenerates this file and reloads Hyprland automatically.
