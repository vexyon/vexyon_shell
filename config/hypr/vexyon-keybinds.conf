# --- Static core mouse binds ---
gesture = 3, horizontal, workspace
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# --- Named action binds ---
bind = SUPER, T, exec, ghostty    # Open terminal (Ghostty + Fish)
bind = SUPER, Q, killactive    # Kill window under cursor
bind = SUPER, A, global, quickshell:launcher    # Open App Launcher
bind = SUPER, E, global, quickshell:filemanager    # Open File Manager
bind = SUPER, B, exec, vexyon-open-browser    # Open default browser
bind = SUPER, C, global, quickshell:controlcenter    # Open Control Center
bind = SUPER, W, togglefloating    # Toggle floating for window under cursor
bind = SUPER ALT, W, global, quickshell:wallpaper    # Open Wallpaper Picker
bind = SUPER, S, togglespecialworkspace, scratchpad    # Toggle Scratchpad
bind = SUPER SHIFT, S, movetoworkspacesilent, special:scratchpad    # Send window under cursor to Scratchpad
bind = SUPER, left, movefocus, l    # Move focus left
bind = SUPER, right, movefocus, r    # Move focus right
bind = SUPER, up, movefocus, u    # Move focus up
bind = SUPER, down, movefocus, d    # Move focus down
bind = SUPER SHIFT, left, swapwindow, l    # Swap window left
bind = SUPER SHIFT, right, swapwindow, r    # Swap window right
bind = SUPER SHIFT, up, swapwindow, u    # Swap window up
bind = SUPER SHIFT, down, swapwindow, d    # Swap window down
bind = , Print, global, quickshell:screenshot    # Interactive screenshot / snip
bind = SUPER, L, global, quickshell:lock    # Lock screen
bind = SUPER, X, global, quickshell:powermenu    # Power menu

# --- Workspace binds (generated from workspaceCount) ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
