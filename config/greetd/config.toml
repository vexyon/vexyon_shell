# Vexyon greeter — greetd config (installed to /etc/greetd/config.toml)
# The greeter runs as the `greeter` user inside a minimal kiosk Hyprland that
# launches the Quickshell greeter from /etc/greetd/vexyon-greeter.

[terminal]
vt = 1

[default_session]
# start-hyprland (Hyprland >= 0.51 watchdog wrapper) instead of the bare
# binary — avoids the on-screen "started without start-hyprland" warning at
# the login screen. It only relaunches Hyprland on a CRASH; the kiosk's clean
# `hyprctl dispatch exit` after login passes through, so greetd can start the
# real user session on this VT.
command = "start-hyprland -- --config /etc/greetd/vexyon-greeter/hyprland.conf"
user = "greeter"
